<h1>Books List</h1>

<a href="#">Add New Book</a>

<br><br>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Author</th>
        <th>Price</th>
        <th>Edition</th>
        <th>Actions</th>
    </tr>

    {% for book in books %}
    <tr>
        <td>{{ book.id }}</td>
        <td>{{ book.title }}</td>
        <td>{{ book.author }}</td>
        <td>{{ book.price }}</td>
        <td>{{ book.edition }}</td>
        <td>
            <a href="#">Edit</a>
            |
            <a href="#">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>
