<h1>Students Many-to-Many</h1>

<a href="{% url 'add_student2' %}">Add Student</a>

<table border="1">
    <tr>
        <th>Name</th>
        <th>Age</th>
        <th>Addresses</th>
        <th>Actions</th>
    </tr>

    {% for student in students %}
    <tr>
        <td>{{ student.name }}</td>
        <td>{{ student.age }}</td>
        <td>
            {% for address in student.addresses.all %}
                {{ address.city }} <br>
            {% empty %}
                No addresses
            {% endfor %}
        </td>
        <td>
            <a href="{% url 'update_student2' student.id %}">Edit</a>
            <a href="{% url 'delete_student2' student.id %}">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>
