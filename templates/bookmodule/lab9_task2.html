<!DOCTYPE html>
<html>
<head>
    <title>Task 2</title>
</head>
<body>
    <h1>Publishers with Total Book Stock</h1>

    <table border="1">
        <tr>
            <th>Publisher Name</th>
            <th>Location</th>
            <th>Total Stock</th>
        </tr>

        {% for publisher in publishers %}
        <tr>
            <td>{{ publisher.name }}</td>
            <td>{{ publisher.location }}</td>
            <td>{{ publisher.total_stock }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
